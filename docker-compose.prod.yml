version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: instaai_postgres_prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password_prod
      POSTGRES_DB: instagram_ai_prod
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: instaai_redis_prod
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: instaai_api_prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres_password_prod@postgres:5432/instagram_ai_prod?schema=public
      - REDIS_URL=redis://redis:6379
      - BYPASS_AUTH=false
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
    restart: always

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: instaai_web_prod
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    restart: always

volumes:
  postgres_prod_data:
  redis_prod_data:
